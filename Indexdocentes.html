<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca Digital Docentes</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --card-bg: #ffffff;
  --accent: #3c8dc2;
  --accent2: #ffaa5e;
  --text: #1a1a2e;
  --muted: #adbfd9;
  --border: rgba(156, 201, 219,0.18); 
  --card-w: 200px;
  --gap: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%;
  background: var(--bg);
  font-family: 'Montserrat', sans-serif;
  color: var(--text);
  overflow-x: hidden;
}

body {
  padding: 36px 0 80px;
  position: relative;
}

body::before, body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  filter: blur(140px);
  opacity: 0.07;
  pointer-events: none;
  z-index: 0;
}
body::before { width: 500px; height: 500px; background: var(--accent); top: -180px; left: -180px; }
body::after  { width: 400px; height: 400px; background: var(--accent2); bottom: -120px; right: -120px; }

/* ── HEADER ── */
header {
  text-align: center;
  margin-bottom: 48px;
  position: relative;
  z-index: 2;
  padding: 0 16px;
}
header .tag {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--accent);
  border: 1px solid var(--border);
  padding: 5px 14px;
  border-radius: 20px;
  margin-bottom: 14px;
  background: rgba(96, 186, 225,0.06);
}
header h1 {
  font-size: clamp(1.5rem, 5vw, 3rem);
  font-weight: 900;
  background: linear-gradient(135deg, #1a1a2e 30%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* ── NAV SWITCH ── */
.nav-switch {
  margin-top: 20px;
  display: flex;
  justify-content: center;
}
.switch-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 26px;
  border-radius: 30px;
  background: linear-gradient(135deg, var(--accent), #4abbed);
  color: #fff;
  font-family: 'Montserrat', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 1px;
  text-decoration: none;
  text-transform: uppercase;
  transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 18px rgba(119, 168, 211,0.28);
}
.switch-btn:hover { opacity: 0.88; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(119, 168, 211,0.35); }
.switch-btn:active { transform: translateY(0); }

/* ── SECTION ── */
.section {
  margin-bottom: 64px;
  position: relative;
  z-index: 2;
}
.section-title {
  text-align: center;
  margin-bottom: 20px;
  padding: 0 16px;
}
.section-title h2 {
  font-size: clamp(1.2rem, 4vw, 1.8rem);
  font-weight: 700;
  margin-bottom: 6px;
  color: var(--text);
}
.section-title p {
  color: #888;
  font-size: 13px;
  line-height: 1.5;
}

/* ── CAROUSEL ── */
.carousel-wrapper {
  position: relative;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 52px;
}
.carousel-track-container {
  overflow: hidden;
  width: 100%;
  padding: 16px 0 40px;
  cursor: grab;
}
.carousel-track-container.dragging { cursor: grabbing; }
.carousel-track {
  display: flex;
  gap: var(--gap);
  transition: transform 0.55s cubic-bezier(0.77,0,0.175,1);
  will-change: transform;
  user-select: none;
}
.carousel-track.no-transition { transition: none; }

/* ── CARD ── */
.book-card {
  flex: 0 0 var(--card-w);
  background: var(--card-bg);
  border-radius: 18px;
  border: 1px solid rgba(119, 168, 211,0.13);
  box-shadow: 0 3px 16px rgba(0,0,0,0.07);
  overflow: hidden;
  opacity: 0.52;
  transform: scale(0.92);
  transition: opacity 0.4s ease, transform 0.4s ease, box-shadow 0.4s ease, border-color 0.4s ease;
}
.book-card.active {
  opacity: 1;
  transform: scale(1);
  border-color: var(--accent);
  box-shadow: 0 16px 48px rgba(119, 168, 211,0.22);
}
.book-card:hover:not(.active) { opacity: 0.75; transform: scale(0.95); }

.book-cover {
  width: 100%;
  aspect-ratio: 3/4;
  object-fit: cover;
  display: block;
  background: #eee;
}
.book-cover-placeholder {
  width: 100%;
  aspect-ratio: 3/4;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 16px;
  color: white;
}
.cover-title { font-size: 13px; font-weight: 700; line-height: 1.3; margin-bottom: 8px; }
.cover-author { font-size: 11px; opacity: 0.8; }

.book-info { padding: 14px 14px 16px; }
.book-title {
  font-size: 12px;
  font-weight: 600;
  line-height: 1.35;
  margin-bottom: 6px;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.book-author {
  color: var(--accent);
  font-size: 11px;
  margin-bottom: 12px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.book-btn {
  display: block;
  text-align: center;
  padding: 9px 6px;
  border-radius: 9px;
  text-decoration: none;
  background: linear-gradient(135deg, var(--accent), #64befa);
  color: white;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  transition: opacity 0.2s, transform 0.2s;
}
.book-btn:hover { opacity: 0.85; transform: translateY(-1px); }
.book-btn:active { transform: translateY(0); }

/* ── NAV ARROWS ── */
.nav-btn {
  position: absolute;
  top: 50%;
  transform: translateY(calc(-50% - 20px));
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(119, 168, 211,0.12);
  color: var(--accent);
  font-size: 18px;
  cursor: pointer;
  z-index: 5;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, transform 0.2s;
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
.nav-btn:hover {
  background: rgba(119, 168, 211,0.3);
  transform: translateY(calc(-50% - 20px)) scale(1.1);
}
.nav-btn.prev { left: 4px; }
.nav-btn.next { right: 4px; }

/* ── DOTS ── */
.dots {
  display: flex;
  justify-content: center;
  gap: 7px;
  margin-top: 4px;
  flex-wrap: wrap;
  padding: 0 16px;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  border: none;
  background: var(--muted);
  cursor: pointer;
  transition: background 0.3s, width 0.3s;
  padding: 0;
  flex-shrink: 0;
}
.dot.active { width: 22px; border-radius: 4px; background: var(--accent); }

/* Cover gradients */
.cover-0 { background: linear-gradient(135deg, #1a1a4e, #3a3aff 80%); }
.cover-1 { background: linear-gradient(135deg, #1e1e1e, #555); }
.cover-2 { background: linear-gradient(135deg, #6a11cb, #2575fc); }
.cover-3 { background: linear-gradient(135deg, #ff512f, #dd2476); }
.cover-4 { background: linear-gradient(135deg, #11998e, #38ef7d); }
.cover-5 { background: linear-gradient(135deg, #fc466b, #3f5efb); }
.cover-6 { background: linear-gradient(135deg, #8360c3, #2ebf91); }
.cover-7 { background: linear-gradient(135deg, #f7971e, #ffd200); }

/* ── RESPONSIVE ── */
@media (max-width: 600px) {
  :root { --card-w: 155px; --gap: 14px; }
  body { padding: 24px 0 60px; }
  header { margin-bottom: 32px; }
  .carousel-wrapper { padding: 0 40px; }
  .nav-btn { width: 34px; height: 34px; font-size: 15px; }
  .cover-title { font-size: 11px; }
  .book-title  { font-size: 11px; }
  .book-info   { padding: 10px 10px 12px; }
  .section     { margin-bottom: 44px; }
}
@media (max-width: 380px) {
  :root { --card-w: 135px; --gap: 12px; }
  .carousel-wrapper { padding: 0 36px; }
}
</style>
</head>
<body>

<header>
  <div class="tag">📚 RECURSOS ELECTRÓNICOS Y FÍSICOS</div>
  <div class="nav-switch">
    <a href="index.html" class="switch-btn">Aprendizaje e Investigación</a>
    <a class="switch-btn">Docencia</a>
  </div>
</header>

<div id="library"></div>

<script>
const sections = [
  {
    title: 'OverDrive',
    subtitle: 'Libros sobre IA, automatización y aprendizaje profundo',
    books: [
      { title: 'Metodologías activas e inteligencia artificial en el aula', author: 'Rabía M Rabet Temsamani', gradient: 'cover-0', image: "https://img2.od-cdn.com/ImageType-100/16602-1/%7B09A02158-B02B-49C8-A7F6-019AC19FF34D%7DIMG100.JPG", url: 'https://utadeo.overdrive.com/media/13050157' },
      { title: 'Inteligencia artificial y educación', author: 'María Dolores Díaz-Noguera Carlos Hervás Gómez', gradient: 'cover-1', image: "https://img2.od-cdn.com/ImageType-100/16602-1/%7BA348E203-C173-4310-9956-BDBD876A569C%7DIMG100.JPG", url: 'https://utadeo.overdrive.com/media/12128253' },
      { title: 'Educación e inteligencia artificial. Generando ecosistemas de aprendizaje adaptativo', author: 'Fernando Leal Ríos. Mauricio Hernández Ramírez', gradient: 'cover-2', image: "https://img2.od-cdn.com/ImageType-100/16602-1/%7BBCBF82C4-E0D3-47C4-87AE-61AF63D5B271%7DIMG100.JPG", url: 'https://utadeo.overdrive.com/media/12438366' },
      { title: 'Competencia Digital, Inteligencia Artificial y Ecosistemas Educativos del Futuro', author: 'Radhames Mejía Eloísa Marrer', gradient: 'cover-3', image: "https://img1.od-cdn.com/ImageType-100/16602-1/%7BEB2BE62B-7F46-42E3-82C7-0D22B799DA6F%7DIMG100.JPG", url: 'https://utadeo.overdrive.com/media/13050067' },
      { title: 'Inteligencia artificial y educación: Desafíos éticos, pedagógicos y epistemológicos en la era digital', author: 'William René Reyes Cabrera', gradient: 'cover-4', image: "https://img3.od-cdn.com/ImageType-100/16602-1/%7BE22D5705-BF2F-4140-8818-4F6FBCFCF584%7DIMG100.JPG", url: 'https://utadeo.overdrive.com/media/13050130' },
      { title: 'Educación y tecnología. Transformar la investigación en la era de la Inteligencia Artificial', author: 'Elena Sánchez-Vega', gradient: 'cover-1', image: "https://img1.od-cdn.com/ImageType-100/16602-1/%7B636D17AB-C218-4E62-AA47-CD3B57F601FA%7DIMG100.JPG", url: 'https://utadeo.overdrive.com/media/13050092' }
    ]
  },
  {
    title: 'E-libro',
    subtitle: 'La Inteligencia Artificial en las diferentes áreas de la sociedad',
    books: [
      { title: 'Inteligencia artificial y otros demonios en educación', author: 'García-Pérez Calabuig, María', gradient: 'cover-5', image: "https://www.dykinson.com/media/img/portadas/979-13-7006-359-7.jpg", url: 'https://elibro.utadeoproxy.elogim.com/es/lc/utadeo/titulos/286625' },
      { title: 'Educación de calidad entre el conductismo, el constructivismo y la inteligencia artificial', author: 'Kriklii, Sofia - García Martínez', gradient: 'cover-6', image: "https://cipres.sanmateo.edu.co/ojs/public/journals/8/cover_issue_240_es_ES.png", url: 'https://elibro.utadeoproxy.elogim.com/es/lc/utadeo/titulos/292078' }
    ]
  },
  {
    title: 'Odilo',
    subtitle: 'Aplicaciones, desafíos y filosofía de la Inteligencia Artificial',
    books: [
      { title: 'Inteligencia artificial para docentes Cómo fomentar su uso pedagógico y ético', author: 'Guillermo Cánovas', gradient: 'cover-1', image: "https://covers.odilo.io/public/OdiloPlace_Bookwire_E8145/9788410552586_2446_640x908.jpg", url: 'https://utadeo.unlimitedlearning.io/info/inteligencia-artificial-para-docentes-como-fomentar-su-uso-pedagogico-y-etico-04060998' },
      { title: 'Inteligencia artificial 101 cosas que debes saber hoy sobre nuestro futuro', author: 'Lasse Rouhiainen', gradient: 'cover-2', image: "https://covers.odilo.io/public/OdiloPlace_Grupo_Planeta_K12_universidad/9788417568122_grupo_planeta_ORIGINAL.jpg", url: 'https://utadeo.unlimitedlearning.io/info/inteligencia-artificial-101-cosas-que-debes-saber-hoy-sobre-nuestro-futuro-02968481' },
      { title: 'Aplicaciones prácticas de la inteligencia artificial en la educación', author: 'Florentino Blas Fernández Cueto', gradient: 'cover-3', image: "https://covers.odilo.io/public/OdiloPlace_Bookwire_E8145/9788426740939_2446_640x908.jpg", url: 'https://utadeo.unlimitedlearning.io/info/aplicaciones-practicas-de-la-inteligencia-artificial-en-la-educacion-04069396' },
      { title: 'El rol de la inteligencia artificial en la educación Redefiniendo los procesos enseñanza-aprendizaje', author: 'Diana Salomé Gayol', gradient: 'cover-4', image: "https://covers.odilo.io/public/OdiloPlace_Bookwire_E8145/9789878145945_2446_640x908.jpg", url: 'https://utadeo.unlimitedlearning.io/info/el-rol-de-la-inteligencia-artificial-en-la-educacion-redefiniendo-los-procesos-ensenanza-aprendizaje-04069394' }
    ]
  },
  {
    title: 'Recursos físicos',
    subtitle: 'Puedes encontrar este material en el piso 4 de la Biblioteca',
    books: [
      { title: 'Inteligencia artificial en ámbitos educativos : propuesta para el trabajo en el aula.', author: 'Ávalos, Mariano', gradient: 'cover-5', image: "https://images.cdn1.buscalibre.com/fit-in/360x360/08/b6/08b6e90054ca77bd1b5faae941516f0e.jpg", url: 'https://research.ebsco.com/c/utjqkg/search/details/qn3zjycl6z?db=cat09062a' },
      { title: 'Derecho a la educación e inteligencia artificial', author: 'Moral Soriano, Leonor', gradient: 'cover-6', image: "https://images.cdn1.buscalibre.com/fit-in/360x360/86/03/8603199760df426409bf18d90d2e436a.jpg", url: 'https://research.ebsco.com/c/utjqkg/search/details/f5wr6myz7v?db=cat09062a' }
    ]
  }
];

// ── ENGINE ────────────────────────────────────────────────────────────────────

function createCarousel(section) {
  const sectionEl = document.createElement('section');
  sectionEl.className = 'section';
  sectionEl.innerHTML = `
    <div class="section-title">
      <h2>${section.title}</h2>
      <p>${section.subtitle}</p>
    </div>
    <div class="carousel-wrapper">
      <button class="nav-btn prev" aria-label="Anterior">&#8592;</button>
      <div class="carousel-track-container">
        <div class="carousel-track"></div>
      </div>
      <button class="nav-btn next" aria-label="Siguiente">&#8594;</button>
    </div>
    <div class="dots"></div>`;

  document.getElementById('library').appendChild(sectionEl);

  const container = sectionEl.querySelector('.carousel-track-container');
  const track     = sectionEl.querySelector('.carousel-track');
  const dotsEl    = sectionEl.querySelector('.dots');
  const prevBtn   = sectionEl.querySelector('.prev');
  const nextBtn   = sectionEl.querySelector('.next');

  let current = 0;

  section.books.forEach((book, i) => {
    const card = document.createElement('div');
    card.className = 'book-card' + (i === 0 ? ' active' : '');
    card.innerHTML = book.image
      ? `<img src="${book.image}" alt="${book.title}" class="book-cover" loading="lazy"
             onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
         <div class="book-cover-placeholder ${book.gradient}" style="display:none">
           <div class="cover-title">${book.title}</div>
           <div class="cover-author">${book.author}</div>
         </div>`
      : `<div class="book-cover-placeholder ${book.gradient}">
           <div class="cover-title">${book.title}</div>
           <div class="cover-author">${book.author}</div>
         </div>`;
    card.innerHTML += `
      <div class="book-info">
        <div class="book-title">${book.title}</div>
        <div class="book-author">${book.author}</div>
        <a href="${book.url}" target="_blank" rel="noopener" class="book-btn">ACCEDE AL LIBRO AQUÍ</a>
      </div>`;

    card.addEventListener('click', () => goTo(i));
    track.appendChild(card);

    const dot = document.createElement('button');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', `Libro ${i + 1}`);
    dot.addEventListener('click', () => goTo(i));
    dotsEl.appendChild(dot);
  });

  function cardW() {
    const c = track.children[0];
    const gap = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--gap')) || 20;
    return c ? c.getBoundingClientRect().width + gap : 220;
  }
  function offset() {
    const cw = container.getBoundingClientRect().width;
    const w  = track.children[0] ? track.children[0].getBoundingClientRect().width : 200;
    return (cw - w) / 2;
  }

  function goTo(index) {
    current = ((index % section.books.length) + section.books.length) % section.books.length;
    track.style.transform = `translateX(${offset() - current * cardW()}px)`;
    track.querySelectorAll('.book-card').forEach((c, i) => c.classList.toggle('active', i === current));
    dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));

  // Touch / mouse drag
  let startX = 0, startScrollX = 0, isDragging = false, moved = false;

  function dragStart(x) {
    isDragging = true; moved = false; startX = x;
    const mat = new WebKitCSSMatrix(getComputedStyle(track).transform);
    startScrollX = mat.m41;
    track.classList.add('no-transition');
    container.classList.add('dragging');
  }
  function dragMove(x) {
    if (!isDragging) return;
    if (Math.abs(x - startX) > 4) moved = true;
    track.style.transform = `translateX(${startScrollX + (x - startX)}px)`;
  }
  function dragEnd(x) {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('no-transition');
    container.classList.remove('dragging');
    Math.abs(x - startX) > 40 ? goTo(x < startX ? current + 1 : current - 1) : goTo(current);
  }

  container.addEventListener('touchstart', e => dragStart(e.touches[0].clientX), { passive: true });
  container.addEventListener('touchmove',  e => dragMove(e.touches[0].clientX),  { passive: true });
  container.addEventListener('touchend',   e => dragEnd(e.changedTouches[0].clientX));
  container.addEventListener('mousedown',  e => { dragStart(e.clientX); e.preventDefault(); });
  window.addEventListener('mousemove',     e => dragMove(e.clientX));
  window.addEventListener('mouseup',       e => dragEnd(e.clientX));
  track.addEventListener('click', e => { if (moved) e.preventDefault(); }, true);

  let resizeTimer;
  window.addEventListener('resize', () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => goTo(current), 120); });

  setTimeout(() => goTo(0), 60);
}

sections.forEach(createCarousel);
</script>
</body>
</html>
